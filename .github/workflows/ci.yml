name: 🧪 Hybrid Automation CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:      # allow manual trigger from GitHub UI

permissions:
  contents: write          # required for gh-pages deployment
  pull-requests: write
  checks: write

env:
  JAVA_VERSION: '11'
  ALLURE_RESULTS: 'target/allure-results'

jobs:
  # ────────────────────────────────────────────────
  # JOB 1 — API Tests (fast, runs first)
  # ────────────────────────────────────────────────
  api-tests:
    name: 🔌 API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: 🧪 Run API Tests
        run: mvn clean test -DsuiteXml=testng-api.xml -B

      - name: 📤 Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: ${{ env.ALLURE_RESULTS }}
          retention-days: 7

      - name: 📤 Upload Surefire Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-api
          path: target/surefire-reports
          retention-days: 7

  # ────────────────────────────────────────────────
  # JOB 2 — UI Tests in parallel across browsers (BONUS: parallelization)
  # ────────────────────────────────────────────────
  ui-tests:
    name: 🌐 UI Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: 🌐 Verify Browser
        run: |
          if [ "${{ matrix.browser }}" = "chrome" ]; then
            google-chrome --version
          else
            firefox --version
          fi

      - name: 🧪 Run UI Tests on ${{ matrix.browser }}
        run: mvn clean test -DsuiteXml=testng-ui.xml -Dbrowser.name=${{ matrix.browser }} -Dbrowser.headless=true -B

      - name: 📤 Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui-${{ matrix.browser }}
          path: ${{ env.ALLURE_RESULTS }}
          retention-days: 7

      - name: 📤 Upload Surefire Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-ui-${{ matrix.browser }}
          path: target/surefire-reports
          retention-days: 7

  # ────────────────────────────────────────────────
  # JOB 3 — Integration Tests (runs after API)
  # ────────────────────────────────────────────────
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [api-tests]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: 🧪 Run Integration Tests
        run: mvn clean test -DsuiteXml=testng-integration.xml -B

      - name: 📤 Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-integration
          path: ${{ env.ALLURE_RESULTS }}
          retention-days: 7

  # ────────────────────────────────────────────────
  # JOB 4 — Aggregate + Publish Allure Report (always runs)
  # ────────────────────────────────────────────────
  publish-report:
    name: 📊 Publish Allure Report
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests, integration-tests]
    if: always()
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download all Allure results
        uses: actions/download-artifact@v4
        with:
          path: all-allure-results

      - name: 🧬 Merge Allure results
        run: |
          mkdir -p merged-allure-results
          find all-allure-results -type f -exec cp {} merged-allure-results/ \;
          echo "Total result files merged: $(ls merged-allure-results | wc -l)"

      - name: 📚 Load Allure history (for trends)
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: 📊 Generate Allure Report with history
        uses: simple-elf/allure-report-action@v1.9
        if: always()
        with:
          allure_results: merged-allure-results
          allure_history: allure-history
          gh_pages: gh-pages
          keep_reports: 20

      - name: 📤 Upload Final Allure Report (Artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-history
          retention-days: 30

      - name: 🚀 Deploy Report to GitHub Pages
        if: github.ref == 'refs/heads/main' && always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

  # ────────────────────────────────────────────────
  # JOB 5 — Notify on Failure (Slack — optional)
  # ────────────────────────────────────────────────
  notify-failure:
    name: 🔔 Notify on Failure
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests, integration-tests]
    if: failure()
    steps:
      - name: 📣 Send Slack Notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"text\": \"❌ *Test Suite Failed*\nRepo: *${{ github.repository }}*\nBranch: *${{ github.ref_name }}*\nCommit: \`${{ github.sha }}\`\nAuthor: *${{ github.actor }}*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|🔍 View Run>\"
            }" \
            "$SLACK_WEBHOOK_URL"

      - name: 📝 GitHub Status Check (auto-handled by job status)
        run: echo "GitHub status check is automatic — job failure marks PR/commit as failed."