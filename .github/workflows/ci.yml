name: 🧪 Hybrid Automation CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: write

env:
  JAVA_VERSION: '11'
  ALLURE_RESULTS: 'target/allure-results'

jobs:

# ───────────────────────────────────────────────
# 1️⃣ API TESTS
# ───────────────────────────────────────────────
  api-tests:
    name: 🔌 API Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: 🧪 Run API Tests
        run: mvn clean test -DsuiteXmlFile=testng-api.xml -B

      - name: 📤 Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: target/allure-results

# ───────────────────────────────────────────────
# 2️⃣ UI TESTS (PARALLEL BROWSERS)
# ───────────────────────────────────────────────
  ui-tests:
    name: 🌐 UI Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: [chrome, firefox]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: 🧪 Run UI Tests
        run: mvn clean test -DsuiteXmlFile=testng-ui.xml -Dbrowser=${{ matrix.browser }} -B

      - name: 📤 Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui-${{ matrix.browser }}
          path: target/allure-results

# ───────────────────────────────────────────────
# 3️⃣ INTEGRATION TESTS
# ───────────────────────────────────────────────
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: api-tests

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: 🧪 Run Integration Tests
        run: mvn clean test -DsuiteXmlFile=testng-integration.xml -B

      - name: 📤 Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-integration
          path: target/allure-results

# ───────────────────────────────────────────────
# 4️⃣ BUILD ALLURE REPORT (FIXED - NO DOCKER)
# ───────────────────────────────────────────────
  publish-report:
    name: 📊 Allure Report
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests, integration-tests]
    if: always()

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download Allure Artifacts
        uses: actions/download-artifact@v4
        with:
          path: allure-results-all

      - name: 🧬 Merge Allure Results
        run: |
          mkdir -p merged-allure-results
          find allure-results-all -type f -name "*.json" -exec cp {} merged-allure-results/ \;
          echo "Merged files:"
          ls merged-allure-results

      - name: ☕ Install Java + Allure CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre wget unzip
          wget https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.zip
          unzip allure-2.27.0.zip
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      - name: 📊 Generate Allure Report
        run: |
          allure generate merged-allure-results --clean -o allure-history

      - name: 📤 Upload Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-history

      - name: 🚀 Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

# ───────────────────────────────────────────────
# 5️⃣ SLACK NOTIFICATION (OPTIONAL)
# ───────────────────────────────────────────────
  notify-failure:
    name: 🔔 Notify Failure
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests, integration-tests]
    if: failure()

    steps:
      - name: Slack Alert
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"❌ Tests Failed in ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nRun: ${{ github.run_id }}\n🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
          }" \
          "$SLACK_WEBHOOK_URL"